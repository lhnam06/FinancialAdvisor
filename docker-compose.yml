version: "3.9"

services:
  db:
    image: postgres:16
    container_name: financial_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: slacker
      POSTGRES_PASSWORD: slackerpass
      POSTGRES_DB: fainance_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slacker -d fainance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: