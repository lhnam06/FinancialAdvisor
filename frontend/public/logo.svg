<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FAinance logo">
  <defs>
    <linearGradient id="fa-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#052e23"/>
      <stop offset="0.55" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="fa-mark" x1="14" y1="50" x2="52" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#ecfccb"/>
    </linearGradient>
    <filter id="fa-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
