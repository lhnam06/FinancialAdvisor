    <path d="M20 50 V18"/>
    <path d="M20 34 H34"/>
    <path d="M20 18 H41 L49 12"/>
    <path d="M43 9 L51 12 L49 20"/>
  </g>

  <circle cx="48" cy="50" r="3.2" fill="#34d399" opacity="0.9"/>
